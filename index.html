<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flashcards anglais - corps humain</title>
  <style>
    :root{
      --bg:#f4f7fb;
      --card:#ffffff;
      --text:#1f2937;
      --accent:#2563eb;
      --soft:#dbe4f0;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:var(--bg);
      color:var(--text);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:16px;
    }
    .app{
      width:min(100%, 520px);
    }
    .panel{
      background:var(--card);
      border-radius:24px;
      box-shadow:0 12px 30px rgba(0,0,0,.08);
      padding:18px;
    }
    h1{
      margin:0 0 8px;
      text-align:center;
      font-size:1.6rem;
    }
    .sub{
      margin:0 0 16px;
      text-align:center;
      color:#4b5563;
      font-size:.98rem;
    }
    .counter{
      display:flex;
      justify-content:center;
      margin-bottom:14px;
    }
    .badge{
      background:#eff6ff;
      color:#1d4ed8;
      padding:8px 14px;
      border-radius:999px;
      font-weight:700;
      font-size:.95rem;
    }
    .card{
      border:none;
      width:100%;
      min-height:360px;
      border-radius:28px;
      background:linear-gradient(180deg, #ffffff, #f8fbff);
      border:3px solid var(--soft);
      cursor:pointer;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:12px;
      padding:20px;
    }
    .emoji{
      font-size:5.5rem;
      line-height:1;
    }
    .word{
      font-size:2rem;
      font-weight:700;
      text-align:center;
    }
    .hint{
      font-size:1rem;
      color:#6b7280;
      text-align:center;
    }
    .controls{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:10px;
      margin-top:14px;
    }
    button.ctrl{
      border:none;
      border-radius:18px;
      padding:14px 10px;
      font-size:1.1rem;
      font-weight:700;
      cursor:pointer;
      background:#eef2ff;
      color:#1e3a8a;
    }
    button.primary{
      background:var(--accent);
      color:white;
    }
    .small{
      text-align:center;
      font-size:.92rem;
      color:#6b7280;
      margin-top:12px;
    }
    @media (max-width:420px){
      .card{min-height:320px}
      .emoji{font-size:4.7rem}
      .word{font-size:1.7rem}
      .controls{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="panel">
      <h1>Flashcards anglais</h1>
      <p class="sub">Touchez la carte pour écouter le mot.</p>

      <div class="counter">
        <div class="badge"><span id="index">1</span> / <span id="total">11</span></div>
      </div>

      <button class="card" id="flashcard" onclick="speakCurrent()">
        <div class="emoji" id="emoji">🧑</div>
        <div class="word" id="word">head</div>
        <div class="hint">Touchez pour écouter 🔊</div>
      </button>

      <div class="controls">
        <button class="ctrl" onclick="prevCard()">⬅️</button>
        <button class="ctrl primary" onclick="speakCurrent()">🔊</button>
        <button class="ctrl" onclick="nextCard()">➡️</button>
      </div>

      <div class="small">Mots : head, eyes, ears, nose, mouth, hair, arm, hand, fingers, leg, foot.</div>
    </div>
  </div>

  <script>
    const cards = [
      { word: "head", emoji: "🧑" },
      { word: "eyes", emoji: "👀" },
      { word: "ears", emoji: "👂" },
      { word: "nose", emoji: "👃" },
      { word: "mouth", emoji: "👄" },
      { word: "hair", emoji: "💇" },
      { word: "arm", emoji: "💪" },
      { word: "hand", emoji: "✋" },
      { word: "fingers", emoji: "🖐️" },
      { word: "leg", emoji: "🦵" },
      { word: "foot", emoji: "🦶" }
    ];

    let current = 0;

    function renderCard() {
      document.getElementById("emoji").textContent = cards[current].emoji;
      document.getElementById("word").textContent = cards[current].word;
      document.getElementById("index").textContent = current + 1;
      document.getElementById("total").textContent = cards.length;
    }

    function speakCurrent() {
      const utter = new SpeechSynthesisUtterance(cards[current].word);
      utter.lang = "en-GB";
      utter.rate = 0.9;
      speechSynthesis.cancel();
      speechSynthesis.speak(utter);
    }

    function nextCard() {
      current = (current + 1) % cards.length;
      renderCard();
      speakCurrent();
    }

    function prevCard() {
      current = (current - 1 + cards.length) % cards.length;
      renderCard();
      speakCurrent();
    }

    renderCard();
  </script>
</body>
</html>
